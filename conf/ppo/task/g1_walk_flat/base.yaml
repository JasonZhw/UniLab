# @package _global_
# Cross-backend TaskCore contract for g1_walk_flat.
#
# These fields define the trained policy's I/O and network shape and are the
# shared default cross-backend contract (issue #579). A backend that wants the
# task to be sim2sim-transferable inherits them verbatim. A backend MAY override a
# field below for single-backend tuning, but then that backend is not
# sim2sim-transferable with the others and resolve_sim2sim_config raises at play
# time (by design). Backend-specific tuning (reward, commands, domain_rand, noise,
# sim params) always stays in the per-backend YAMLs.
#
# Enforced at play time by src/unilab/training/sim2sim.py (DENYLIST); see AGENTS.md.
algo:
  empirical_normalization: false
  obs_groups:
    actor:
      - actor
  policy:
    actor_hidden_dims: [512, 256, 128]
    critic_hidden_dims: [512, 256, 128]
env:
  control_config:
    action_scale: 0.25
