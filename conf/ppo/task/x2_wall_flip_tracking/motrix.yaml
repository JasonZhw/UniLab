# @package _global_
training:
  task_name: X2WallFlipTracking
  sim_backend: motrix
  play_steps: 300  # 6s play video @ ctrl_dt=0.02 (fps 50)
  play_env_num: 16
  render_spacing: 3.0
  cam_distance: 14.0
  cam_azimuth: 225.0
  cam_elevation: -18.0
  cam_lookat: [4.5, 4.5, 1.0]
interactive:
  action_mode: policy
algo:
  num_envs: 1024
  max_iterations: 9500
  save_interval: 500
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
    critic:
      - critic
  algorithm:
    entropy_coef: 0.005
    desired_kl: 0.01
env:
  motrix_max_iterations: 3
  sampling_mode: start
  truncate_on_clip_end: false
  sim_dt: 0.005
  control_config:
    action_scale:
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
      - 0.25
  anchor_pos_z_threshold: 0.5
  ee_body_pos_z_threshold: 0.5
  terminate_on_undesired_contacts: true
  noise_config:
    level: 0.0
play_profile:
  enabled: true
  env:
    render_spacing: 4.0
  scene:
    enabled: true
    source_model_file: src/unilab/assets/robots/x2/scene_flat_with_wall.xml
    ground_texture_file: src/unilab/assets/robots/g1/textures/floor.png
    skybox_rgb1: [0.90, 0.90, 0.91]
    skybox_rgb2: [0.68, 0.68, 0.70]
    ground_texrepeat: [0.25, 0.25]
reward:
  scales:
    motion_global_root_pos: 0.5
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.5
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_ee_body_pos_z: 2.0
    motion_joint_pos: 0.5
    motion_joint_vel: 0.25
    action_rate_l2: -0.005
    joint_limit: -10.0
    undesired_contacts: -0.1
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
