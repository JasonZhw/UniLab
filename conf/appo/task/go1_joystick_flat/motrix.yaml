# @package _global_
algo:
  max_iterations: 300
  num_envs: 1024
  steps_per_env: 24
  actor:
    distribution_cfg:
      init_std: 0.5
  algorithm:
    learning_rate: 0.0005
    entropy_coef: 0.001
    desired_kl: 0.008
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.015
    similar_to_default: -0.15
    action_smooth: -0.01
    swing_feet_z: 2.0
  tracking_sigma: 0.25
  base_height_target: 0.3
training:
  task_name: Go1JoystickFlat
  sim_backend: motrix
env:
  sim_dt: 0.01
  commands:
    vel_limit:
    - - 0.5
      - 0.0
      - 0.0
    - - 0.5
      - 0.0
      - 0.0
